<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFFICE OF THE DIRECTOR OF ADMINISTRATION - Gwagwalada Area Council</title>
<style>
  :root {
    --green: #008751;
    --red: #d21f1f;
    --dark: #14251f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--dark);
    height: 100vh;
    overflow: hidden;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 20, 15, 0.96);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 20px;
  }
  #box {
    background: #fff;
    border: 6px solid var(--green);
    border-radius: 14px;
    max-width: 500px;
    width: 100%;
    padding: 25px 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .logos {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 15px;
    font-size: 40px;
  }
  .logo-placeholder {
    width: 60px;
    height: 60px;
    background: #f0f0f0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 35px;
  }
  #box h1 {
    color: var(--red);
    font-size: 32px;
    letter-spacing: 2px;
    margin: 10px 0;
    font-weight: 900;
    text-transform: uppercase;
  }
  #box .property-text {
    color: var(--dark);
    font-size: 18px;
    font-weight: 700;
    margin: 15px 0 5px;
    line-height: 1.3;
  }
  #box .council-name {
    color: var(--dark);
    font-size: 22px;
    font-weight: 900;
    margin: 10px 0 20px;
    line-height: 1.3;
    text-transform: uppercase;
  }
  #box .dept-title {
    background: #f0f0f0;
    color: var(--dark);
    font-size: 15px;
    font-weight: 600;
    padding: 12px;
    margin: 15px 0;
    border-radius: 6px;
    border-left: 4px solid var(--green);
  }
  #okBtn {
    background: var(--green);
    color: #fff;
    border: none;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #okBtn:hover { 
    background: #006b40; 
  }
  #viewer {
    width: 100%;
    height: 100vh;
    border: none;
    display: none;
  }
  @media (max-width: 480px) {
    #box h1 { font-size: 26px; }
    #box .council-name { font-size: 18px; }
    #box .property-text { font-size: 16px; }
    .logo-placeholder { width: 50px; height: 50px; font-size: 30px; }
  }
</style>
</head>
<body>

<div id="overlay">
  <div id="box">
    <div class="logos">
      <div class="logo-placeholder">🇬</div>
      <div class="logo-placeholder">🏛️</div>
    </div>
    
    <h1>NO TRESPASS</h1>
    
    <div class="property-text">THIS PROPERTY<br>BELONGS TO</div>
    
    <div class="council-name">GWAGWALADA AREA COUNCIL<br>FCT ABUJA</div>
    
    <div class="dept-title">OFFICE OF THE DIRECTOR OF ADMINISTRATION</div>
    
    <button id="okBtn">OK, VIEW DOCUMENT</button>
  </div>
</div>

<iframe id="viewer" src="administration.pdf"></iframe>

<script>
  document.getElementById('okBtn').addEventListener('click', function () {
    document.getElementById('overlay').style.display = 'none';

    var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

    if (isMobile) {
      window.location.href = "administration.pdf";
    } else {
      var v = document.getElementById('viewer');
      v.style.display = 'block';
    }
  });
</script>

</body>
</html>
